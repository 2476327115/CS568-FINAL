<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tokyo Itinerary Planner</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #eef1f4;
      color: #1a1a2e;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #ffffff;
      color: #1a1a2e;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      border-bottom: 1px solid #dde3ea;
    }
    header h1 { font-size: 1.2rem; font-weight: 600; letter-spacing: 0.3px; }
    header span { font-size: 0.85rem; color: #6f7c8f; margin-left: auto; }

    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Map ── */
    #map {
      flex: 1 1 60%;
      min-width: 0;
    }

    /* ── Sidebar ── */
    .sidebar {
      flex: 0 0 380px;
      background: #fff;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #dce3eb;
      overflow-y: auto;
      order: -1;
    }

    .section {
      padding: 18px 20px;
      border-bottom: 1px solid #e6ebf2;
    }
    .section-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #7a8499;
      margin-bottom: 12px;
    }

    /* Date + weekday */
    .date-row { display: flex; gap: 10px; align-items: center; }
    .date-row input[type="date"] {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid #d1d5e0;
      border-radius: 0;
      font-size: 0.9rem;
      color: #1a1a2e;
      background: #fff;
    }
    .weekday-badge {
      background: #f2f5f8;
      color: #3b4a5f;
      padding: 6px 12px;
      border-radius: 0;
      font-size: 0.82rem;
      font-weight: 600;
      white-space: nowrap;
    }

    /* Weather inputs */
    .weather-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .weather-grid label {
      font-size: 0.75rem;
      color: #7a8499;
      display: block;
      margin-bottom: 3px;
    }
    .weather-grid input {
      width: 100%;
      padding: 7px 8px;
      border: 1px solid #d1d5e0;
      border-radius: 0;
      font-size: 0.85rem;
    }
    .weather-note {
      font-size: 0.75rem;
      color: #9ab;
      margin-top: 7px;
    }
    #forecast-note {
      margin-top: 8px;
      font-size: 0.76rem;
      color: #5b6477;
      line-height: 1.35;
    }
    #forecast-window-note {
      margin-top: 8px;
      font-size: 0.76rem;
      color: #6f7c8f;
      line-height: 1.35;
    }

    /* Site picker list */
    #site-picker {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 40px;
      max-height: 240px;
      overflow-y: auto;
    }
    .site-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      background: #f6f8fb;
      border-radius: 0;
      font-size: 0.85rem;
      border: 1px solid #e4e9f1;
    }
    .site-row .cat-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .site-row .site-name { flex: 1; }
    .site-toolbar { display: flex; gap: 8px; margin-bottom: 10px; }
    .site-toolbar button {
      border: 1px solid #d1d5e0;
      background: #fff;
      color: #3b4a5f;
      padding: 5px 8px;
      border-radius: 0;
      font-size: 0.78rem;
      cursor: pointer;
    }
    .empty-hint {
      font-size: 0.82rem;
      color: #aab;
      text-align: center;
      padding: 12px 0;
    }

    /* Generate button */
    #generate-btn {
      width: 100%;
      padding: 12px;
      background: #2f3b4f;
      color: #fff;
      border: none;
      border-radius: 0;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #generate-btn:hover:not(:disabled) { background: #243041; }
    #generate-btn:disabled { background: #b0bbdd; cursor: not-allowed; }

    /* Weather result banner */
    #weather-banner {
      display: none;
      font-size: 0.82rem;
      padding: 8px 12px;
      border-radius: 6px;
      margin-top: 10px;
    }
    #weather-banner.outdoor { background: #e8f5e9; color: #2e7d32; }
    #weather-banner.indoor  { background: #fff3e0; color: #e65100; }
    #weather-banner.mixed   { background: #e3f2fd; color: #1565c0; }

    /* Itinerary */
    #itinerary {
      padding: 18px 20px;
      flex: 1;
    }
    #itinerary-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #7a8499;
      margin-bottom: 14px;
    }
    .schedule-item {
      display: flex;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #f0f2f5;
    }
    .schedule-item:last-child { border-bottom: none; }
    .step-num {
      width: 26px; height: 26px;
      border-radius: 0;
      background: #2f3b4f;
      color: #fff;
      font-size: 0.8rem;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .step-body { flex: 1; }
    .step-poi  { font-size: 0.92rem; font-weight: 600; margin-bottom: 2px; }
    .step-time {
      font-size: 0.82rem;
      color: #4a6cf7;
      font-weight: 600;
      margin-bottom: 3px;
    }
    .step-why  { font-size: 0.78rem; color: #7a8499; }
    .cat-badge {
      display: inline-block;
      font-size: 0.68rem;
      padding: 2px 7px;
      border-radius: 0;
      font-weight: 600;
      text-transform: capitalize;
      margin-left: 6px;
      vertical-align: middle;
    }

    .loading {
      text-align: center;
      padding: 30px;
      color: #7a8499;
      font-size: 0.9rem;
    }
    .error-msg {
      background: #fff0f0;
      color: #c0392b;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 0.85rem;
    }

    /* Map tooltip */
    .leaflet-tooltip {
      font-size: 0.8rem;
      font-weight: 600;
    }
  </style>
</head>
<body>

<header>
  <h1>Tokyo Itinerary Planner</h1>
  <span>Select a date and check sites from the left list to get recommendations</span>
</header>

<div class="main">
  <div id="map"></div>

  <div class="sidebar">

    <!-- Date -->
    <div class="section">
      <div class="section-title">Visit Date</div>
      <div class="date-row">
        <input type="date" id="visit-date" />
        <div class="weekday-badge" id="weekday-label">Monday</div>
      </div>
      <div id="forecast-window-note"></div>
    </div>

    <!-- Weather (optional) -->
    <div class="section">
      <div class="section-title">Weather (optional)</div>
      <div class="weather-grid">
        <div>
          <label>Temp (°C)</label>
          <input type="number" id="weather-temp" placeholder="e.g. 22" step="0.1" />
        </div>
        <div>
          <label>Humidity (%)</label>
          <input type="number" id="weather-humidity" placeholder="e.g. 65" min="0" max="100" />
        </div>
        <div>
          <label>Pressure (hPa)</label>
          <input type="number" id="weather-pressure" placeholder="e.g. 1013" />
        </div>
      </div>
      <div class="weather-note">Leave blank to skip weather adjustments.</div>
      <div id="forecast-note"></div>
    </div>

    <!-- Site List -->
    <div class="section">
      <div class="section-title">Choose Sites (<span id="poi-count">0</span>)</div>
      <div class="site-toolbar">
        <button type="button" id="select-all-sites">Select all</button>
        <button type="button" id="clear-all-sites">Clear all</button>
      </div>
      <div id="site-picker">
        <div class="empty-hint">Loading site list...</div>
      </div>
    </div>

    <!-- Generate -->
    <div class="section">
      <button id="generate-btn" disabled>Generate Itinerary</button>
      <div id="weather-banner"></div>
    </div>

    <!-- Results -->
    <div id="itinerary">
      <div id="itinerary-title" style="display:none">Recommended Schedule</div>
      <div id="schedule-output"></div>
    </div>

  </div>
</div>

<script>
// ── Category colors ────────────────────────────────────────────────────────────
const CAT_COLOR = {
  museum:        "#7c3aed",
  shrine:        "#d97706",
  viewpoint:     "#0ea5e9",
  park:          "#16a34a",
  shopping_area: "#db2777",
  amusement_park:"#ea580c",
};

const CAT_LABEL = {
  museum: "Museum", shrine: "Shrine", viewpoint: "Viewpoint",
  park: "Park", shopping_area: "Shopping", amusement_park: "Amusement",
};

function categoryColor(cat) {
  return CAT_COLOR[cat] || "#555";
}

// ── State ─────────────────────────────────────────────────────────────────────
const selectedPois = new Set();
const markers = {};  // poi_name → Leaflet marker
const checkboxByPoi = {};
let autoRecommendTimer = null;
let requestSeq = 0;

// ── Map setup ─────────────────────────────────────────────────────────────────
const map = L.map("map").setView([35.685, 139.753], 12);
L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
  attribution: "© OpenStreetMap contributors © CARTO",
  maxZoom: 19,
}).addTo(map);

const pinDefault = new L.Icon({
  iconUrl: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png",
  shadowUrl: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png",
  iconSize: [25, 41],
  iconAnchor: [12, 41],
  popupAnchor: [1, -34],
  shadowSize: [41, 41],
});

const pinSelected = new L.Icon({
  iconUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png",
  shadowUrl: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png",
  iconSize: [25, 41],
  iconAnchor: [12, 41],
  popupAnchor: [1, -34],
  shadowSize: [41, 41],
});

function updateMarker(poiName) {
  const m = markers[poiName];
  if (!m) return;
  const sel = selectedPois.has(poiName);
  m.setIcon(sel ? pinSelected : pinDefault);
}

// ── Load POIs from backend ─────────────────────────────────────────────────────
fetch("/api/pois")
  .then(r => r.json())
  .then(pois => {
    renderSitePicker(pois);
    for (const [name, data] of Object.entries(pois)) {
      const marker = L.marker([data.lat, data.lng], {
        icon: pinDefault,
      });
      marker._poiData = data;
      marker._poiName = name;

      marker.bindTooltip(name, { direction: "top", offset: [0, -6] });
      marker.bindPopup(`
        <div style="min-width:170px">
          <div style="font-weight:700;margin-bottom:4px">${name}</div>
          <div style="font-size:12px;color:#4b5563;margin-bottom:6px">${(data.category || "unknown").replaceAll("_"," ")}</div>
          ${data.peak_hour !== undefined ? `<div style="font-size:12px;color:#334155;margin-bottom:6px">Most popular hour: ${data.peak_hour}:00</div>` : ""}
          ${data.photo ? `<img src="${data.photo}" alt="${name}" style="width:100%;height:90px;object-fit:cover;border:1px solid #d1d5db" />` : ""}
        </div>
      `);
      marker.on("click", () => togglePoi(name));
      marker.on("mouseover", () => marker.openPopup());
      marker.on("mouseout", () => marker.closePopup());
      marker.addTo(map);
      markers[name] = marker;
    }
  });

function togglePoi(name) {
  if (selectedPois.has(name)) {
    selectedPois.delete(name);
  } else {
    selectedPois.add(name);
  }
  updateMarker(name);
  renderSelectedList();
  scheduleAutoRecommend();
}

function renderSitePicker(pois) {
  const list = document.getElementById("site-picker");
  list.innerHTML = "";
  Object.entries(pois).forEach(([name, data]) => {
    const color = categoryColor(data.category);
    const row = document.createElement("label");
    row.className = "site-row";
    row.innerHTML = `
      <input type="checkbox" data-poi="${name}" />
      <div class="cat-dot" style="background:${color}"></div>
      <span class="site-name">${name}</span>
    `;
    const cb = row.querySelector("input");
    cb.addEventListener("change", () => togglePoi(name));
    checkboxByPoi[name] = cb;
    list.appendChild(row);
  });
}

function renderSelectedList() {
  const countEl = document.getElementById("poi-count");
  const btn = document.getElementById("generate-btn");
  countEl.textContent = selectedPois.size;
  Object.entries(checkboxByPoi).forEach(([name, cb]) => {
    cb.checked = selectedPois.has(name);
  });

  if (selectedPois.size === 0) {
    btn.disabled = true;
    return;
  }

  btn.disabled = false;
}

// ── Date / weekday ─────────────────────────────────────────────────────────────
const WEEKDAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

const dateInput = document.getElementById("visit-date");
const weekdayLabel = document.getElementById("weekday-label");

// Default to today
const today = new Date();
dateInput.value = today.toISOString().split("T")[0];
weekdayLabel.textContent = WEEKDAYS[today.getDay()];
loadForecastWindow();
loadForecastForDate(dateInput.value);

dateInput.addEventListener("change", () => {
  const d = new Date(dateInput.value + "T12:00:00");
  weekdayLabel.textContent = WEEKDAYS[d.getDay()];
  loadForecastForDate(dateInput.value);
  scheduleAutoRecommend();
});

async function loadForecastForDate(dateStr) {
  const note = document.getElementById("forecast-note");
  if (!dateStr) return;
  note.textContent = "Loading forecast...";
  try {
    const res = await fetch(`/api/forecast?date=${encodeURIComponent(dateStr)}`);
    const data = await res.json();
    if (data.error) {
      note.textContent = `Forecast unavailable: ${data.error}`;
      return;
    }
    const midday = data.hourly_midday || {};
    const daily = data.daily || {};
    if (midday.temperature_c != null) document.getElementById("weather-temp").value = midday.temperature_c;
    if (midday.humidity_pct != null) document.getElementById("weather-humidity").value = midday.humidity_pct;
    if (midday.pressure_hpa != null) document.getElementById("weather-pressure").value = midday.pressure_hpa;
    note.textContent = `Forecast: wind max ${daily.wind_max_kmh ?? "?"} km/h, sunset ${daily.sunset ? daily.sunset.split("T")[1] : "?"}, rain risk ${daily.precipitation_probability_max ?? "?"}%`;
    scheduleAutoRecommend();
  } catch (e) {
    note.textContent = `Forecast unavailable: ${e.message}`;
  }
}


async function loadForecastWindow() {
  const el = document.getElementById("forecast-window-note");
  try {
    const res = await fetch("/api/forecast-window");
    const data = await res.json();
    if (data.error) {
      el.textContent = "Forecast coverage info unavailable.";
      return;
    }
    el.textContent = `Forecast available: ${data.supported_start} to ${data.supported_end}. Outside this range, live forecast is not available.`;
  } catch {
    el.textContent = "Forecast coverage info unavailable.";
  }
}

function getWeekdayNum() {
  const d = new Date(dateInput.value + "T12:00:00");
  const jsDay = d.getDay(); // 0=Sun, 6=Sat
  // Convert to Mon=0 … Sun=6
  return (jsDay + 6) % 7;
}

// ── Generate ───────────────────────────────────────────────────────────────────
document.getElementById("generate-btn").addEventListener("click", async () => {
  await generateRecommendation();
});

async function generateRecommendation() {
  const btn = document.getElementById("generate-btn");
  const output = document.getElementById("schedule-output");
  const title = document.getElementById("itinerary-title");
  const banner = document.getElementById("weather-banner");
  const currentReq = ++requestSeq;

  if (selectedPois.size === 0 || !dateInput.value) {
    return;
  }

  btn.disabled = true;
  btn.textContent = "Generating…";
  output.innerHTML = '<div class="loading">Optimizing your schedule…</div>';
  title.style.display = "block";
  banner.style.display = "none";

  const payload = {
    pois: [...selectedPois],
    weekday_num: getWeekdayNum(),
    visit_date: dateInput.value,
    weather: {
      temp:     document.getElementById("weather-temp").value,
      humidity: document.getElementById("weather-humidity").value,
      pressure: document.getElementById("weather-pressure").value,
    },
  };

  try {
    const res = await fetch("/api/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    const data = await res.json();

    if (currentReq !== requestSeq) return;

    if (data.error) {
      output.innerHTML = `<div class="error-msg">${data.error}</div>`;
    } else {
      renderSchedule(data.schedule);
      renderWeatherBanner(data.weather);
    }
  } catch (e) {
    output.innerHTML = `<div class="error-msg">Server error: ${e.message}</div>`;
  }

  btn.disabled = false;
  btn.textContent = "Generate Itinerary";
}

function scheduleAutoRecommend() {
  if (autoRecommendTimer) clearTimeout(autoRecommendTimer);
  if (selectedPois.size === 0 || !dateInput.value) return;
  autoRecommendTimer = setTimeout(() => {
    generateRecommendation();
  }, 450);
}

document.getElementById("select-all-sites").addEventListener("click", () => {
  Object.keys(checkboxByPoi).forEach((name) => {
    selectedPois.add(name);
    updateMarker(name);
  });
  renderSelectedList();
  scheduleAutoRecommend();
});

document.getElementById("clear-all-sites").addEventListener("click", () => {
  Object.keys(checkboxByPoi).forEach((name) => {
    selectedPois.delete(name);
    updateMarker(name);
  });
  renderSelectedList();
  scheduleAutoRecommend();
});

function renderWeatherBanner(w) {
  const banner = document.getElementById("weather-banner");
  const cls = w.recommendation === "outdoor_preferred" ? "outdoor"
            : w.recommendation === "indoor_preferred"  ? "indoor"
            : "mixed";
  const icons = { outdoor: "☀️", indoor: "🏠", mixed: "⛅" };
  const labels = {
    outdoor_preferred: "Good weather — outdoor spots prioritized",
    indoor_preferred:  "Unfavorable weather — indoor venues preferred",
    mixed:             "Mixed conditions — balanced schedule",
  };
  banner.className = "weather-banner " + cls;
  banner.style.display = "block";
  banner.textContent = labels[w.recommendation] || w.recommendation;

  // Re-apply style since className was reset
  const styles = {
    outdoor: "background:#e8f5e9;color:#2e7d32",
    indoor:  "background:#fff3e0;color:#e65100",
    mixed:   "background:#e3f2fd;color:#1565c0",
  };
  banner.style.cssText = `display:block;font-size:0.82rem;padding:8px 12px;border-radius:6px;margin-top:10px;${styles[cls]}`;
}

function renderSchedule(schedule) {
  const output = document.getElementById("schedule-output");
  if (!schedule.length) {
    output.innerHTML = '<div class="empty-hint">No schedule could be generated.</div>';
    return;
  }

  output.innerHTML = schedule.map((item, i) => {
    const color = categoryColor(item.category);
    const catLabel = CAT_LABEL[item.category] || item.category;
    return `
      <div class="schedule-item">
        <div class="step-num">${i + 1}</div>
        <div class="step-body">
          <div class="step-poi">
            ${item.poi}
            <span class="cat-badge" style="background:${color}22;color:${color}">${catLabel}</span>
          </div>
          <div class="step-time">${item.time_label}</div>
          <div class="step-why">${item.explanation}</div>
        </div>
      </div>`;
  }).join("");
}
</script>

</body>
</html>
