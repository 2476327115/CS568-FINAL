<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tokyo Itinerary Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="page">
    <section class="panel">
      <h1>Tokyo Site Explorer</h1>
      <p class="subtitle">Choose sites from the list. Only selected sites are shown on the map.</p>

      <div class="toolbar">
        <button id="select-all" type="button">Select all</button>
        <button id="clear-all" type="button">Clear all</button>
      </div>

      <div id="site-list" class="site-list" aria-label="Site list"></div>

      <div id="site-details" class="details" aria-live="polite">
        <p>Select a pin to view details.</p>
      </div>
    </section>

    <section class="map-wrap">
      <div id="map" aria-label="Map of Japan with Tokyo site pins"></div>
    </section>
  </main>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="./app.js"></script>
</body>
</html>
